<!-- @dsCard group="Colors" viewport="700x180" name="Brand core" subtitle="Honey Yellow primary + Deep Navy ink" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:20px; background:var(--surface-page); font-family:var(--font-sans); }
  .row { display:flex; gap:14px; flex-wrap:wrap; }
  .sw { width:150px; border-radius:var(--radius-lg); overflow:hidden; border:1px solid var(--border-subtle); box-shadow:var(--shadow-sm); }
  .chip { height:84px; display:flex; align-items:flex-end; padding:10px; }
  .meta { padding:8px 10px; background:var(--surface-card); }
  .name { font-size:var(--text-sm); font-weight:600; color:var(--text-primary); }
  .hex { font-family:var(--font-mono); font-size:var(--text-xs); color:var(--text-muted); }
</style></head>
<body>
<div class="row">
  <div class="sw"><div class="chip" style="background:var(--honey-500)"><span style="font-size:var(--text-xs);font-weight:700;color:var(--ink-800)">PRIMARY</span></div><div class="meta"><div class="name">Honey Yellow</div><div class="hex">--honey-500 · #FBCB0A</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--honey-600)"></div><div class="meta"><div class="name">Honey Hover</div><div class="hex">--honey-600 · #D9A800</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--ink-800)"><span style="font-size:var(--text-xs);font-weight:700;color:var(--honey-400)">INK</span></div><div class="meta"><div class="name">Deep Navy</div><div class="hex">--ink-800 · #1A2242</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--ink-950)"></div><div class="meta"><div class="name">Navy 950</div><div class="hex">--ink-950 · #0C1030</div></div></div>
</div>
</body></html>
