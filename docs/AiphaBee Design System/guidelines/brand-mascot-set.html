<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:22px; background:var(--surface-page); font-family:var(--font-sans); }
  .grid { display:grid; grid-template-columns:repeat(5,1fr); gap:14px; }
  .cell { background:var(--surface-card); border:1px solid var(--border-subtle); border-radius:var(--radius-lg); box-shadow:var(--shadow-sm);
          display:flex; flex-direction:column; align-items:center; gap:6px; padding:12px 8px; }
  .cell img { width:88px; height:88px; object-fit:contain; }
  .lab { font-size:var(--text-2xs); font-weight:600; color:var(--text-muted); }
</style></head>
<body>
<div class="grid">
  <div class="cell"><img src="../assets/mascot/greeting.png" alt="greeting" /><span class="lab">greeting · 引导</span></div>
  <div class="cell"><img src="../assets/mascot/forage.png" alt="forage" /><span class="lab">forage · 采集</span></div>
  <div class="cell"><img src="../assets/mascot/insight.png" alt="insight" /><span class="lab">insight · 洞察</span></div>
  <div class="cell"><img src="../assets/mascot/thinking.png" alt="thinking" /><span class="lab">thinking · 研究</span></div>
  <div class="cell"><img src="../assets/mascot/success.png" alt="success" /><span class="lab">success · 看涨</span></div>
  <div class="cell"><img src="../assets/mascot/empty.png" alt="empty" /><span class="lab">empty · 空状态</span></div>
  <div class="cell"><img src="../assets/mascot/risk.png" alt="risk" /><span class="lab">risk · 风险</span></div>
  <div class="cell"><img src="../assets/mascot/avatar.png" alt="avatar" /><span class="lab">avatar · 头像</span></div>
  <div class="cell"><img src="../assets/mascot/compare.png" alt="compare" /><span class="lab">compare · 对比/PK</span></div>
  <div class="cell"><img src="../assets/mascot/honey-finish.png" alt="honey-finish" /><span class="lab">honey-finish · 撒蜜收尾</span></div>
</div>
</body></html>
