<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:24px; background:var(--surface-page); font-family:var(--font-display); color:var(--text-primary); }
  .line { display:flex; align-items:baseline; gap:16px; padding:7px 0; border-bottom:1px solid var(--border-subtle); }
  .tag { font-family:var(--font-mono); font-size:11px; color:var(--text-muted); width:118px; flex-shrink:0; }
  .spec { letter-spacing:var(--tracking-tight); font-weight:700; line-height:var(--leading-tight); }
</style></head>
<body>
  <div class="line"><span class="tag">5xl · 700</span><span class="spec" style="font-size:var(--text-5xl)">Find the alpha</span></div>
  <div class="line"><span class="tag">4xl · 700</span><span class="spec" style="font-size:var(--text-4xl)">AI-Powered IPO Analysis</span></div>
  <div class="line"><span class="tag">3xl · 700</span><span class="spec" style="font-size:var(--text-3xl)">实时市场概览</span></div>
  <div class="line"><span class="tag">2xl · 600</span><span class="spec" style="font-size:var(--text-2xl);font-weight:600">市场情绪指标 Sentiment</span></div>
  <div class="line" style="border:none"><span class="tag">lg · 600</span><span class="spec" style="font-size:var(--text-lg);font-weight:600">Honeycomb Intelligence</span></div>
</body></html>
