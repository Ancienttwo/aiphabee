<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:0; background:var(--surface-page); font-family:var(--font-sans); display:flex; }
  .a { flex:1; background:var(--neutral-0); display:flex; align-items:center; justify-content:center; padding:20px; }
  .b { flex:1; background:var(--ink-800); display:flex; align-items:center; justify-content:center; padding:20px; }
  img { max-height:170px; max-width:90%; object-fit:contain; }
  .b img { mix-blend-mode:screen; filter:brightness(1.05); }
</style></head>
<body>
  <div class="a"><img src="../assets/aiphabee-logo-full.png" alt="AiphaBee logo on white" /></div>
  <div class="b"><img src="../assets/aiphabee-mascot.png" alt="AiphaBee mascot on navy" /></div>
</body></html>
