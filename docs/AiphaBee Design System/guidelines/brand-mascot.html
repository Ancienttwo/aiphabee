<!-- @dsCard group="Brand" viewport="700x240" name="Mascot & motif" subtitle="The research bee + honeycomb hexagon" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:22px; background:var(--surface-honey); font-family:var(--font-sans); display:flex; gap:22px; align-items:center; }
  .mascot { width:150px; flex-shrink:0; }
  .mascot img { width:100%; }
  h3 { margin:0 0 8px; font-family:var(--font-display); font-size:var(--text-2xl); font-weight:700; color:var(--ink-800); letter-spacing:var(--tracking-tight); }
  p { margin:0 0 10px; font-size:var(--text-sm); line-height:var(--leading-relaxed); color:var(--text-body); max-width:420px; }
  .tags { display:flex; gap:8px; flex-wrap:wrap; }
  .tag { padding:4px 11px; border-radius:var(--radius-pill); font-size:var(--text-xs); font-weight:600; background:var(--honey-500); color:var(--ink-800); }
  .tag.navy { background:var(--ink-800); color:#fff; }
</style></head>
<body>
  <div class="mascot"><img src="../assets/aiphabee-mascot.png" alt="AiphaBee research bee" /></div>
  <div>
    <h3>The Research Bee</h3>
    <p>A busy, bespectacled bee hunting honey — <em>alpha</em> — for investors. Framed by a honeycomb hexagon with a candlestick chart and a rising arrow: diligence, signal, and upside.</p>
    <div class="tags">
      <span class="tag">Honey = alpha</span>
      <span class="tag navy">Hexagon = honeycomb intelligence</span>
      <span class="tag navy">Glasses = research rigor</span>
    </div>
  </div>
</body></html>
