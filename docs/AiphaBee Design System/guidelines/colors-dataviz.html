<!-- @dsCard group="Colors" viewport="700x180" name="Data-viz signals" subtitle="Sentiment · demand · tier · 6-dim chart" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:20px; background:var(--surface-page); font-family:var(--font-sans); }
  .grp { margin-bottom:14px; }
  .glab { font-size:var(--text-2xs); font-weight:700; letter-spacing:var(--tracking-caps); text-transform:uppercase; color:var(--text-subtle); margin-bottom:7px; }
  .row { display:flex; gap:8px; flex-wrap:wrap; }
  .pill { display:flex; align-items:center; gap:6px; padding:5px 11px; border-radius:var(--radius-pill); font-size:var(--text-xs); font-weight:600; color:#fff; }
  .dot { width:9px;height:9px;border-radius:50%; }
  .chartrow { display:flex; gap:6px; }
  .cseg { width:46px; height:26px; border-radius:var(--radius-sm); }
</style></head>
<body>
<div class="grp"><div class="glab">Market sentiment</div><div class="row">
  <span class="pill" style="background:var(--sentiment-bullish)">牛市 Bullish</span>
  <span class="pill" style="background:var(--sentiment-cautious);color:var(--ink-800)">谨慎乐观 Cautious</span>
  <span class="pill" style="background:var(--sentiment-neutral)">中性 Neutral</span>
  <span class="pill" style="background:var(--sentiment-bearish)">熊市 Bearish</span>
</div></div>
<div class="grp"><div class="glab">Demand level · oversubscription</div><div class="row">
  <span class="pill" style="background:var(--demand-extreme)">&gt;100×</span>
  <span class="pill" style="background:var(--demand-very-hot);color:var(--ink-800)">50–100×</span>
  <span class="pill" style="background:var(--demand-hot)">10–50×</span>
  <span class="pill" style="background:var(--demand-normal)">5–10×</span>
  <span class="pill" style="background:var(--demand-cold)">&lt;5×</span>
</div></div>
<div class="grp"><div class="glab">6-dimension chart palette</div><div class="chartrow">
  <div class="cseg" style="background:var(--chart-1)"></div>
  <div class="cseg" style="background:var(--chart-2)"></div>
  <div class="cseg" style="background:var(--chart-3)"></div>
  <div class="cseg" style="background:var(--chart-4)"></div>
  <div class="cseg" style="background:var(--chart-5)"></div>
  <div class="cseg" style="background:var(--chart-6)"></div>
</div></div>
</body></html>
