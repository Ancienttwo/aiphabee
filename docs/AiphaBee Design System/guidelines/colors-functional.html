<!-- @dsCard group="Colors" viewport="700x170" name="Functional hues" subtitle="Green · Violet · Red · Blue · Orange · Pink" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:20px; background:var(--surface-page); font-family:var(--font-sans); }
  .row { display:flex; gap:12px; flex-wrap:wrap; }
  .sw { width:104px; }
  .chip { height:60px; border-radius:var(--radius-md); box-shadow:var(--shadow-sm); }
  .name { font-size:var(--text-xs); font-weight:600; color:var(--text-primary); margin-top:7px; }
  .hex { font-family:var(--font-mono); font-size:10px; color:var(--text-muted); }
</style></head>
<body>
<div class="row">
  <div class="sw"><div class="chip" style="background:var(--green-500)"></div><div class="name">Growth Green</div><div class="hex">#10B981 · profit</div></div>
  <div class="sw"><div class="chip" style="background:var(--violet-500)"></div><div class="name">AI Violet</div><div class="hex">#8B5CF6 · AI</div></div>
  <div class="sw"><div class="chip" style="background:var(--red-500)"></div><div class="name">Startup Red</div><div class="hex">#EF4444 · risk</div></div>
  <div class="sw"><div class="chip" style="background:var(--blue-500)"></div><div class="name">Info Blue</div><div class="hex">#3B82F6</div></div>
  <div class="sw"><div class="chip" style="background:var(--orange-500)"></div><div class="name">Warning</div><div class="hex">#F59E0B</div></div>
  <div class="sw"><div class="chip" style="background:var(--pink-500)"></div><div class="name">Pink</div><div class="hex">#EC4899</div></div>
</div>
</body></html>
