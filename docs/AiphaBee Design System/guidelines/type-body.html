<!-- @dsCard group="Type" viewport="700x260" name="Body & mono" subtitle="Inter body + JetBrains Mono for data" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin:0; padding:24px; background:var(--surface-page); }
  .blk { margin-bottom:16px; }
  .tag { font-family:var(--font-mono); font-size:11px; color:var(--text-muted); margin-bottom:5px; }
  .body { font-family:var(--font-sans); font-size:var(--text-base); line-height:var(--leading-relaxed); color:var(--text-body); max-width:560px; }
  .small { font-family:var(--font-sans); font-size:var(--text-sm); color:var(--text-muted); }
  .mono { font-family:var(--font-mono); color:var(--text-primary); font-variant-numeric:tabular-nums; }
  .data { display:flex; gap:24px; align-items:baseline; }
  .big { font-size:28px; font-weight:700; }
</style></head>
<body>
  <div class="blk"><div class="tag">base · 400 · body</div>
    <p class="body" style="margin:0">Make informed IPO investment decisions with data-driven valuation models, AI-powered prospectus analysis, and comprehensive risk scoring.</p></div>
  <div class="blk"><div class="tag">sm · 400 · secondary</div>
    <p class="small" style="margin:0">AI 驱动的市场情绪分析，帮助您把握 IPO 投资时机。</p></div>
  <div class="blk" style="margin:0"><div class="tag">mono · tabular figures — prices, tickers, multiples</div>
    <div class="data">
      <span class="mono big">HKD 24.80</span>
      <span class="mono">2769.HK</span>
      <span class="mono" style="color:var(--green-600)">+18.6%</span>
      <span class="mono">128.4×</span>
    </div></div>
</body></html>
