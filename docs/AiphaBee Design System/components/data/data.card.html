<!-- @dsCard group="Components" viewport="700x420" name="StatCard · ScoreMeter · RatingStars" subtitle="Data signals — KPI tiles, 0–100 gauge, 5-star rating" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--surface-page); font-family: var(--font-sans); }
  .eyebrow { font-size: var(--text-2xs); font-weight: 700; letter-spacing: var(--tracking-caps);
             text-transform: uppercase; color: var(--text-subtle); margin: 0 0 10px; }
  .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
  .panel { background: var(--surface-card); border: 1px solid var(--border-subtle);
           border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); padding: 20px; max-width: 420px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { StatCard, ScoreMeter, RatingStars } = window.AiphaBeeDesignSystem_599c13;
  function Demo() {
    return (
      <div>
        <p className="eyebrow">Stat tiles</p>
        <div className="stats">
          <StatCard label="Active IPOs" value="12" tone="honey" icon={<span>🗓</span>} />
          <StatCard label="Avg. first-day pop" value="+18.6%" tone="green" delta="3.2% MoM" deltaDirection="up" icon={<span>📈</span>} />
          <StatCard label="Watchlist" value="7" tone="violet" icon={<span>★</span>} />
        </div>

        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 18, marginTop: 24, alignItems: 'start' }}>
          <div className="panel">
            <p className="eyebrow">Score gauge</p>
            <ScoreMeter label="情绪指数 Sentiment" value={72} tone="bullish" labels={["极度悲观","中性","极度乐观"]} />
            <div style={{ height: 16 }} />
            <ScoreMeter label="综合评分 Overall" value={48} tone="cautious" labels={["弱","中","强"]} />
          </div>
          <div className="panel">
            <p className="eyebrow">Institution rating</p>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
              <RatingStars value={4.5} size={20} showValue reviews={128} />
              <RatingStars value={3} size={20} showValue />
              <RatingStars value={5} size={20} showValue reviews={42} />
            </div>
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
